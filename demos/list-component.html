<component name="list-box">
  <var name="people" value='["Ada", "Lin", "Ida"]' mutable="true"></var>
  <div class="box">
    <h3>Favorite Scientists</h3>
    <ul id="people"></ul>
  </div>
  <keyedlist target="#people" of="people" item="item" index="i" key="item">
    <li class="person">
      <span>{item}</span>
      <button class="promote" type="button">Remove</button>
      <event target=".promote" type="click">
        <splice array="people" index="i" delete="1"></splice>
      </event>
    </li>
  </keyedlist>
</component>
